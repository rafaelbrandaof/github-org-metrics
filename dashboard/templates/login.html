<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — GitHub Metrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#050510;color:#fff;overflow:hidden;-webkit-font-smoothing:antialiased}

        .scene{position:fixed;inset:0;z-index:0}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:float 20s ease-in-out infinite}
        .orb-1{width:500px;height:500px;background:radial-gradient(circle,#6c5ce7,transparent);top:-10%;left:-5%;animation-delay:0s}
        .orb-2{width:400px;height:400px;background:radial-gradient(circle,#0984e3,transparent);bottom:-15%;right:-5%;animation-delay:-7s}
        .orb-3{width:300px;height:300px;background:radial-gradient(circle,#e17055,transparent);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-14s;opacity:.3}
        @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}

        .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:64px 64px;z-index:1;mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black,transparent)}

        .wrap{position:relative;z-index:2;width:100%;max-width:420px;padding:20px}
        .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:48px 40px;backdrop-filter:blur(40px);box-shadow:0 24px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}

        .logo{text-align:center;margin-bottom:40px}
        .logo-mark{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6c5ce7,#a855f7,#ec4899);display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 12px 40px rgba(108,92,231,.4);position:relative}
        .logo-mark::after{content:'';position:absolute;inset:-2px;border-radius:18px;background:linear-gradient(135deg,#6c5ce7,#a855f7,#ec4899);z-index:-1;opacity:.5;filter:blur(12px)}
        .logo-mark svg{width:28px;height:28px;fill:#fff}
        .logo h1{font-size:22px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .logo p{font-size:13px;color:rgba(255,255,255,.4);margin-top:6px;font-weight:400}

        .field{margin-bottom:20px}
        .field label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:8px;letter-spacing:.3px;text-transform:uppercase}
        .field input{width:100%;padding:13px 16px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(255,255,255,.04);color:#fff;font-size:14px;font-family:inherit;outline:none;transition:all .25s}
        .field input:focus{border-color:rgba(108,92,231,.6);box-shadow:0 0 0 4px rgba(108,92,231,.12);background:rgba(255,255,255,.06)}
        .field input::placeholder{color:rgba(255,255,255,.2)}

        .btn-login{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#6c5ce7,#a855f7);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .25s;margin-top:6px;letter-spacing:.3px;position:relative;overflow:hidden}
        .btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.1));opacity:0;transition:opacity .25s}
        .btn-login:hover::before{opacity:1}
        .btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(108,92,231,.4)}
        .btn-login:active{transform:translateY(0)}

        .alert{padding:12px 16px;border-radius:12px;font-size:13px;font-weight:500;margin-bottom:20px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
        .foot{text-align:center;margin-top:24px;font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.2px}
    </style>
</head>
<body>
    <div class="scene">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-bg"></div>
    <div class="wrap">
        <div class="card">
            <div class="logo">
                <div class="logo-mark">
                    <svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                </div>
                <h1>GitHub Metrics</h1>
                <p>Organization performance analytics</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}<div class="alert">{{ message }}</div>{% endfor %}
            {% endwith %}
            <form method="POST" action="{{ url_for('login') }}">
                <div class="field"><label>Username</label><input type="text" name="username" placeholder="Enter username" required autofocus></div>
                <div class="field"><label>Password</label><input type="password" name="password" placeholder="Enter password" required></div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
        </div>
        <p class="foot">Default: admin / admin</p>
    </div>
</body>
</html>
