<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Metrics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#09090b;--card:#18181b;--border:#27272a;--elevated:#27272a;
            --text:#fafafa;--muted:#71717a;--secondary:#a1a1aa;
            --accent:#6366f1;--accent-light:#818cf8;
            --red:#ef4444;
        }
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased}
        .bg{position:fixed;inset:0;overflow:hidden;z-index:0}
        .bg::before{content:'';position:absolute;width:600px;height:600px;top:-200px;right:-200px;background:radial-gradient(circle,rgba(99,102,241,.08),transparent 70%);border-radius:50%}
        .bg::after{content:'';position:absolute;width:500px;height:500px;bottom:-200px;left:-100px;background:radial-gradient(circle,rgba(168,85,247,.06),transparent 70%);border-radius:50%}
        .container{position:relative;z-index:1;width:100%;max-width:400px;padding:20px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:44px 36px;box-shadow:0 12px 48px rgba(0,0,0,.4)}
        .logo{text-align:center;margin-bottom:36px}
        .logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#a855f7);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(99,102,241,.25)}
        .logo-icon svg{width:26px;height:26px;fill:#fff}
        .logo h1{font-size:20px;font-weight:700;letter-spacing:-.4px}
        .logo p{font-size:13px;color:var(--muted);margin-top:6px}
        .field{margin-bottom:18px}
        .field label{display:block;font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:8px;letter-spacing:.2px}
        .field input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
        .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
        .field input::placeholder{color:var(--muted)}
        .btn-login{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px}
        .btn-login:hover{opacity:.9}
        .btn-login:active{transform:scale(.98)}
        .alert{padding:10px 14px;border-radius:10px;font-size:12px;font-weight:500;margin-bottom:18px;border:1px solid}
        .alert-error{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:var(--red)}
        .foot{text-align:center;margin-top:20px;font-size:11px;color:var(--muted)}
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                </div>
                <h1>Metrics Dashboard</h1>
                <p>Sign in to view organization analytics</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            <form method="POST" action="{{ url_for('login') }}">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
        </div>
        <p class="foot">Default credentials: admin / admin</p>
    </div>
</body>
</html>
